services:
  mongodb:
    image: mongo:7
    container_name: meropriyatno-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build: .
    container_name: meropriyatno-backend
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/meropriyatno
      - PORT=3000
    env_file:
      - .env
    restart: unless-stopped

volumes:
  mongo-data:
