services:
  mongodb:
    image: mongo:7
    container_name: meropriyatno-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db

  backend:
    build: .
    image: ghcr.io/${IMAGE_OWNER:-meropriyatno}/meropriyatno-server:latest
    container_name: meropriyatno-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/meropriyatno?authSource=admin

volumes:
  mongo-data: